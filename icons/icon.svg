<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.6" stop-color="#10b981"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="hl" cx="0.4" cy="0.3" r="0.5">
      <stop offset="0" stop-color="white" stop-opacity="0.18"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a3e635"/>
      <stop offset="1" stop-color="#65a30d"/>
    </linearGradient>
  </defs>

  <!-- 둥근 사각형 배경 + 하이라이트 -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#hl)"/>

  <!-- 작은 잎 액센트 (우상단) -->
  <g transform="translate(395 115) rotate(-30)">
    <ellipse cx="0" cy="0" rx="42" ry="22" fill="url(#leaf)"/>
    <path d="M -35 0 Q 0 -3 35 0" stroke="#16a34a" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- v6.27: 텍스트 제거 + 문양 중앙 + 크게 (사용자 요청) -->
  <!-- 큰 흰색 원 (재활용 심볼 컨테이너) -->
  <circle cx="256" cy="256" r="174" fill="white" opacity="0.95"/>
  <circle cx="256" cy="256" r="174" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>

  <!-- 표준 ♻️ Möbius 재활용 심볼 (3개 화살표 시계방향 흐름) -->
  <!-- 정삼각형 꼭짓점 3개를 잇는 직선 stem + 끝에 화살촉 -->
  <!-- 꼭짓점: (-90deg) top=(256,120) / (30deg) br=(374.4,324) / (150deg) bl=(137.6,324). R=136. -->
  <g fill="#0f766e" stroke="#0f766e" stroke-width="42" stroke-linecap="round" stroke-linejoin="round">
    <!-- stem 1: top → bottom-right -->
    <line x1="256" y1="120" x2="334" y2="256"/>
    <!-- stem 2: bottom-right → bottom-left -->
    <line x1="374.4" y1="324" x2="137.6" y2="324"/>
    <!-- stem 3: bottom-left → top -->
    <line x1="178" y1="256" x2="256" y2="120"/>
  </g>
  <!-- 화살촉 3개 (각 꼭짓점 = tip, 다음 변 방향) -->
  <g fill="#0f766e">
    <!-- 화살촉 1: bottom-right (tip), pointing along br→bl edge -->
    <polygon points="374.4,324 320,290 320,358"/>
    <!-- 화살촉 2: bottom-left (tip), pointing along bl→top edge -->
    <polygon points="137.6,324 194,358 160,265"/>
    <!-- 화살촉 3: top (tip), pointing along top→br edge -->
    <polygon points="256,120 218,180 290,180"/>
  </g>
</svg>
