<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.6" stop-color="#10b981"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="hl" cx="0.4" cy="0.3" r="0.5">
      <stop offset="0" stop-color="white" stop-opacity="0.18"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a3e635"/>
      <stop offset="1" stop-color="#65a30d"/>
    </linearGradient>
  </defs>

  <!-- 둥근 사각형 배경 + 하이라이트 -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#hl)"/>

  <!-- 작은 잎 액센트 (우상단) -->
  <g transform="translate(395 115) rotate(-30)">
    <ellipse cx="0" cy="0" rx="42" ry="22" fill="url(#leaf)"/>
    <path d="M -35 0 Q 0 -3 35 0" stroke="#16a34a" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 큰 흰색 원 (재활용 심볼 컨테이너) -->
  <circle cx="256" cy="240" r="125" fill="white" opacity="0.95"/>
  <circle cx="256" cy="240" r="125" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>

  <!-- 표준 재활용 심볼 (3개의 삼각형 + 화살촉, 120도 대칭) -->
  <g transform="translate(256 240)" fill="#0f766e">
    <!-- Arrow 1 (top) -->
    <g transform="rotate(0)">
      <polygon points="-32,-65 32,-65 0,-95"/>
      <rect x="-12" y="-65" width="24" height="35"/>
    </g>
    <!-- Arrow 2 (bottom-right, 120 deg) -->
    <g transform="rotate(120)">
      <polygon points="-32,-65 32,-65 0,-95"/>
      <rect x="-12" y="-65" width="24" height="35"/>
    </g>
    <!-- Arrow 3 (bottom-left, 240 deg) -->
    <g transform="rotate(240)">
      <polygon points="-32,-65 32,-65 0,-95"/>
      <rect x="-12" y="-65" width="24" height="35"/>
    </g>
  </g>

  <!-- "여기선" 텍스트 (하단) -->
  <text x="256" y="440" font-size="62" font-weight="900" fill="white"
        text-anchor="middle"
        font-family="Apple SD Gothic Neo, Malgun Gothic, Nanum Gothic, sans-serif"
        letter-spacing="-2">여기선</text>
</svg>
